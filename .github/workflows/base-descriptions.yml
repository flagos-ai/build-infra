name: Base image descriptions

# Post-build: capture the versions actually baked into each base image, compose a
# per-image description markdown (single source for the docs site, the in-repo
# base/<name>.md file, and the Harbor repository description), then commit + upload.
#
# Separate from the build (per the design): version extraction needs the built
# image, and keeping this out of the build workflow keeps both simpler.
#
# Self-healing: self-hosted runner connectivity to GitHub is unreliable across
# vendors. The accumulate job collects whatever extractors succeed, saves partial
# results to a state branch, then self-triggers with only the missing backends.
# This loops until all 14 are collected or the retry cap (50) is hit.

on:
  workflow_dispatch:
    inputs:
      backend:
        description: 'Backends to process — "all" or space-separated names'
        type: string
        default: 'all'
      retry_count:
        description: 'Number of retries so far (set by the workflow itself)'
        type: number
        default: 0
  workflow_run:
    workflows: ["Base Image Build (manual)"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  set-matrix:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: python3 -m pip install --user pyyaml
      - id: m
        env:
          BACKEND: ${{ github.event.inputs.backend || 'all' }}
        run: |
          if [[ "${BACKEND}" == "all" ]]; then
            python3 scripts/generate_matrix.py > matrix.json
          else
            python3 scripts/generate_matrix.py ${BACKEND} > matrix.json
          fi
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  extract:
    needs: set-matrix
    # Self-hosted runners are best-effort. When a runner is unreachable
    # (checkout / Harbor login / docker permissions), the job fails here.
    # The accumulate job detects the gap and re-dispatches only that backend.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    runs-on: ${{ fromJSON(matrix.runson) }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install PyYAML
        run: |
          python3 -c "import yaml" 2>/dev/null \
            || python3 -m pip install --user --break-system-packages pyyaml
      - name: Harbor login (for image pull)
        env:
          HARBOR_PW: ${{ secrets.HARBOR_AC_FLAGOS_BASE }}
          # Harbor is internal — bypass any HTTP_PROXY/HTTPS_PROXY the runner
          # may have set for GitHub access, otherwise docker login routes
          # Harbor traffic through the proxy and fails.
          # Only uppercase HTTP_PROXY/HTTPS_PROXY (lowercase clash with runner
          # env vars set by the GitHub Actions runner config).
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          no_proxy: "harbor.baai.ac.cn,.baai.ac.cn"
        run: |
          host=$(python3 -c "import yaml;print(yaml.safe_load(open('.github/build-config.yml'))['registry']['host'])")
          for i in 1 2 3; do
            if printf '%s' "$HARBOR_PW" | docker login "$host" -u tengqm --password-stdin; then
              exit 0
            fi
            echo "Harbor login attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "::warning::Harbor login failed after 3 attempts — skipping ${{ matrix.name }}"
          exit 1

      - name: Verify base image (best-effort)
        continue-on-error: true
        run: |
          python3 docs/gen_data.py
          python3 scripts/verify_base.py "${{ matrix.name }}"

      - name: Extract baked-in system-package versions
        run: |
          python3 docs/gen_data.py
          python3 docs/extract_versions.py "${{ matrix.name }}" versions
      - uses: actions/upload-artifact@v7
        with:
          name: versions-${{ matrix.name }}
          path: versions/${{ matrix.name }}.tsv
          if-no-files-found: warn

  accumulate:
    needs: [set-matrix, extract]
    if: always() && needs.set-matrix.result == 'success'
    runs-on: [self-hosted, h20]
    env:
      GH_TOKEN: ${{ github.token }}
      RETRY_COUNT: ${{ github.event.inputs.retry_count || 0 }}
      MAX_RETRIES: 50
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install PyYAML
        run: |
          python3 -c "import yaml" 2>/dev/null \
            || python3 -m pip install --user --break-system-packages pyyaml

      - name: Download version artifacts (this run)
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: versions-dl
          pattern: versions-*
          merge-multiple: false

      - name: Accumulate
        run: |
          set -euo pipefail
          label="$(git describe --tags --abbrev=0 | sed 's/^v//')"
          state_branch="auto/versions-${label}"
          retry="${RETRY_COUNT:-0}"

          mkdir -p versions

          # 1. Restore previously accumulated TSVs from the state branch.
          if git ls-remote --exit-code origin "refs/heads/${state_branch}" 2>/dev/null; then
            echo "--- restoring accumulated versions from ${state_branch} ---"
            git fetch origin "${state_branch}"
            git archive "origin/${state_branch}" versions/ | tar xf - -C . 2>/dev/null || true
          fi
          prev=$(find versions -name '*.tsv' -type f | wc -l)
          echo "Restored from state: ${prev}"

          # 2. Merge new TSVs from this run.
          find versions-dl -name '*.tsv' -exec cp {} versions/ \; 2>/dev/null || true
          now=$(find versions -name '*.tsv' -type f | wc -l)
          echo "After merging this run: ${now} (was ${prev})"

          # 3. Check completeness.
          python3 docs/gen_data.py
          expected=$(python3 docs/missing_versions.py 2>/dev/null \
            | awk '/^COUNT / {print $3}' || echo "14")
          missing=$(python3 docs/missing_versions.py 2>/dev/null \
            | awk '/^MISSING / {print $2}' || true)

          if [ -z "$missing" ] && [ "$now" -ge "$expected" ]; then
            echo "=== ALL ${now}/${expected} BACKENDS COLLECTED ==="

            # --- Finalize: generate descriptions + open PR ---
            VERSIONS_DIR="$PWD/versions" python3 docs/gen_descriptions.py

            git config user.name "flagos-ci"
            git config user.email "noreply@flagos.net"
            git add docs/content/en/base/*.md docs/content/zh-cn/base/*.md base/*.md
            if git diff --cached --quiet; then
              echo "No description changes — nothing to PR."
            else
              pr_branch="auto/base-descriptions-${label}"
              git checkout -b "${pr_branch}"
              git commit -m "docs(base): refresh image descriptions for ${label}"
              git push -f origin "${pr_branch}"

              body="Automated refresh of per-image descriptions (baked-in system-package versions) for ${label}."
              body+=$'\n\n'"**Version data:** ${now}/${expected} backends"
              body+=$'\n\n'"On merge, the descriptions publish to the docs site and Harbor."

              if ! gh pr view "${pr_branch}" >/dev/null 2>&1; then
                gh pr create --base "${GITHUB_REF_NAME}" --head "${pr_branch}" \
                  --title "docs(base): refresh image descriptions for ${label}" \
                  --body "${body}"
              fi
              gh pr merge "${pr_branch}" --auto --squash || \
                echo "auto-merge queued/unavailable — PR left for review"
            fi

            # Clean up the state branch — done accumulating.
            git push origin --delete "${state_branch}" 2>/dev/null || true
            echo "Done. State branch ${state_branch} deleted."
            exit 0
          fi

          # 4. Not yet complete — save accumulated TSVs to state branch.
          #    Use write-tree + commit-tree to avoid touching the working
          #    directory (which may be dirty from artifact download).
          echo "=== INCOMPLETE: ${now}/${expected} backends after retry ${retry} ==="
          echo "Still missing:"
          python3 docs/missing_versions.py 2>/dev/null | grep '^MISSING ' | sed 's/^MISSING /  - /' || true

          git add versions/
          tree=$(git write-tree)
          commit=$(echo "state: ${now}/${expected} versions after retry ${retry}" \
            | git commit-tree -p "origin/${GITHUB_REF_NAME}" "${tree}")
          git push -f origin "${commit}:refs/heads/${state_branch}"
          git reset HEAD versions/ 2>/dev/null || true

          # 5. Self-trigger with only the missing backends.
          if [ "$retry" -ge "${MAX_RETRIES:-50}" ]; then
            echo "::error::Retry cap (${MAX_RETRIES}) reached — giving up."
            echo "Missing backends:"
            python3 docs/missing_versions.py 2>/dev/null | grep '^MISSING ' | sed 's/^MISSING /  - /'
            exit 1
          fi

          missing_names=$(python3 docs/missing_versions.py 2>/dev/null \
            | awk '/^MISSING / {print $2}' | tr '\n' ' ')
          next_retry=$((retry + 1))
          echo "Self-triggering retry ${next_retry}/${MAX_RETRIES} for: ${missing_names}"
          gh workflow run ".github/workflows/base-descriptions.yml" \
            -f backend="${missing_names}" \
            -f retry_count="${next_retry}"
