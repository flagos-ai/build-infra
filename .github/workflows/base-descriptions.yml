name: Base image descriptions

# Post-build: capture the versions actually baked into each base image, compose a
# per-image description markdown (single source for the docs site, the in-repo
# base/<name>.md file, and the Harbor repository description), then commit + upload.
#
# Separate from the build (per the design): version extraction needs the built
# image, and keeping this out of the build workflow keeps both simpler.
#
# Transport: extract jobs push TSV files via git to per-backend branches
# (auto/versions-<label>/<backend>) instead of using upload-artifact, which
# reliably hangs through HTTP_PROXY on some self-hosted runners.
# Accumulate fetches all per-backend branches, merges them, and saves the
# cumulative set to a state branch.
#
# Self-healing: self-hosted runner connectivity to GitHub is unreliable across
# vendors. The accumulate job collects whatever extractors succeed, saves partial
# results to a state branch, then self-triggers with only the missing backends.
# This loops until all 14 are collected or the retry cap (50) is hit.

on:
  workflow_dispatch:
    inputs:
      backend:
        description: 'Backends to process — "all" or space-separated names'
        type: string
        default: 'all'
      retry_count:
        description: 'Number of retries so far (set by the workflow itself)'
        type: number
        default: 0
  workflow_run:
    workflows: ["Base Image Build (manual)"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  set-matrix:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: python3 -m pip install --user pyyaml
      - id: m
        env:
          BACKEND: ${{ github.event.inputs.backend || 'all' }}
        run: |
          if [[ "${BACKEND}" == "all" ]]; then
            python3 scripts/generate_matrix.py > matrix.json
          else
            python3 scripts/generate_matrix.py ${BACKEND} > matrix.json
          fi
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  extract:
    needs: set-matrix
    # Self-hosted runners are best-effort. When a runner is unreachable
    # (checkout / Harbor login / docker permissions), the job fails here.
    # The accumulate job detects the gap and re-dispatches only that backend.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    runs-on: ${{ fromJSON(matrix.runson) }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install PyYAML
        run: |
          python3 -c "import yaml" 2>/dev/null \
            || python3 -m pip install --user --break-system-packages pyyaml

      - name: Delete stale version branch
        if: always()
        run: |
          label="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo 'unknown')"
          git push origin --delete "auto/versions-${label}/${{ matrix.name }}" 2>/dev/null || true
          echo "Cleared auto/versions-${label}/${{ matrix.name }}"

      - name: Harbor login (for image pull)
        env:
          HARBOR_PW: ${{ secrets.HARBOR_AC_FLAGOS_BASE }}
          # Harbor is internal — bypass any HTTP_PROXY/HTTPS_PROXY the runner
          # may have set for GitHub access, otherwise docker login routes
          # Harbor traffic through the proxy and fails.
          # Only uppercase HTTP_PROXY/HTTPS_PROXY (lowercase clash with runner
          # env vars set by the GitHub Actions runner config).
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          no_proxy: "harbor.baai.ac.cn,.baai.ac.cn"
        run: |
          host=$(python3 -c "import yaml;print(yaml.safe_load(open('.github/build-config.yml'))['registry']['host'])")
          for i in 1 2 3; do
            if printf '%s' "$HARBOR_PW" | docker login "$host" -u tengqm --password-stdin; then
              exit 0
            fi
            echo "Harbor login attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "::warning::Harbor login failed after 3 attempts — skipping ${{ matrix.name }}"
          exit 1

      - name: Verify base image (best-effort)
        continue-on-error: true
        id: verify
        run: |
          python3 docs/gen_data.py
          python3 scripts/verify_base.py "${{ matrix.name }}"

      - name: Extract baked-in system-package versions
        run: |
          python3 docs/gen_data.py
          python3 docs/extract_versions.py "${{ matrix.name }}" versions

      - name: Record verify status
        if: always()
        run: |
          mkdir -p versions
          echo "${{ steps.verify.outcome }}" > "versions/${{ matrix.name }}.verify_outcome"

      - name: Push version TSV via git
        run: python3 scripts/upload_version_tsv.py "${{ matrix.name }}" versions

  accumulate:
    needs: [set-matrix, extract]
    if: always() && needs.set-matrix.result == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RETRY_COUNT: ${{ github.event.inputs.retry_count || 0 }}
      MAX_RETRIES: 50
    outputs:
      done: ${{ steps.collect.outputs.done }}
      missing: ${{ steps.collect.outputs.missing }}
      count: ${{ steps.collect.outputs.count }}
      label: ${{ steps.collect.outputs.label }}
      verify_ok: ${{ steps.collect.outputs.verify_ok }}
      verify_fail: ${{ steps.collect.outputs.verify_fail }}
      verify_skip: ${{ steps.collect.outputs.verify_skip }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: python3 -m pip install --user pyyaml

      - name: Fetch version TSVs from extract jobs
        run: python3 scripts/fetch_version_tsvs.py versions-remote

      # collect: restore state → merge TSVs → check completeness → save state.
      # Always exits 0 — the next step (Finalize or Retry) acts on the
      # done/missing outputs.
      - id: collect
        env:
          GIT_AUTHOR_NAME: flagos-ci
          GIT_AUTHOR_EMAIL: noreply@flagos.net
          GIT_COMMITTER_NAME: flagos-ci
          GIT_COMMITTER_EMAIL: noreply@flagos.net
        run: |
          result=$(python3 scripts/collect_version_tsvs.py \
            --versions versions --remote versions-remote \
            --retry "${RETRY_COUNT:-0}")
          echo "$result"

          # Parse JSON once, write each field to GITHUB_OUTPUT.
          echo "$result" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for k in ('done', 'count', 'label', 'missing',
                    'verify_ok', 'verify_fail', 'verify_skip'):
              print(f'{k}={d[k]}')
          " | tee -a "$GITHUB_OUTPUT"

      - name: Finalize (descriptions + PR) or retry
        if: always() && steps.collect.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSIONS_DIR: ${{ github.workspace }}/versions
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          # collect poisons the index (git add -f versions/); unstage it.
          git restore --staged .
          git clean -fd -- versions-remote 2>/dev/null || true

          python3 scripts/finalize_descriptions.py \
            --mode base \
            --done "${{ steps.collect.outputs.done }}" \
            --count "${{ steps.collect.outputs.count || 0 }}" \
            --label "${{ steps.collect.outputs.label || 'unknown' }}" \
            --missing "${{ steps.collect.outputs.missing || '' }}" \
            --verify-ok "${{ steps.collect.outputs.verify_ok || 0 }}" \
            --verify-fail "${{ steps.collect.outputs.verify_fail || 0 }}" \
            --verify-skip "${{ steps.collect.outputs.verify_skip || 0 }}" \
            --retry "${{ env.RETRY_COUNT || 0 }}" \
            --max-retries "${MAX_RETRIES:-50}"
