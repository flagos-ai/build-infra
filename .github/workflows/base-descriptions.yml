name: Base image descriptions

# Post-build: capture the versions actually baked into each base image, compose a
# per-image description markdown (single source for the docs site, the in-repo
# base/<name>.md file, and the Harbor repository description), then commit + upload.
#
# Separate from the build (per the design): version extraction needs the built
# image, and keeping this out of the build workflow keeps both simpler.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Base Image Build (manual)"]
    types: [completed]

permissions:
  contents: write   # compose job commits the generated descriptions

defaults:
  run:
    shell: bash

jobs:
  set-matrix:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: python3 -m pip install --user pyyaml
      - id: m
        run: |
          python3 scripts/generate_matrix.py > matrix.json
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  extract:
    needs: set-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    runs-on: ${{ fromJSON(matrix.runson) }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install PyYAML
        run: |
          python3 -c "import yaml" 2>/dev/null \
            || python3 -m pip install --user --break-system-packages pyyaml
      - name: Harbor login (for image pull)
        env:
          HARBOR_PW: ${{ secrets.HARBOR_AC_FLAGOS_BASE }}
          # Harbor is internal — bypass any HTTP_PROXY/HTTPS_PROXY the runner
          # may have set for GitHub access, otherwise docker login routes
          # Harbor traffic through the proxy and fails.
          # Only uppercase HTTP_PROXY/HTTPS_PROXY (lowercase clash with runner
          # env vars set by the GitHub Actions runner config).
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          no_proxy: "harbor.baai.ac.cn,.baai.ac.cn"
        run: |
          host=$(python3 -c "import yaml;print(yaml.safe_load(open('.github/build-config.yml'))['registry']['host'])")
          printf '%s' "$HARBOR_PW" | docker login "$host" -u tengqm --password-stdin

      - name: Verify base image (best-effort)
        continue-on-error: true
        run: |
          python3 docs/gen_data.py
          python3 scripts/verify_base.py "${{ matrix.name }}"

      - name: Extract baked-in system-package versions
        run: |
          python3 docs/gen_data.py
          python3 docs/extract_versions.py "${{ matrix.name }}" versions
      - uses: actions/upload-artifact@v7
        with:
          name: versions-${{ matrix.name }}
          path: versions/${{ matrix.name }}.tsv
          if-no-files-found: warn

  compose:
    needs: [set-matrix, extract]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: python3 -m pip install --user pyyaml
      - name: Download version artifacts
        uses: actions/download-artifact@v8
        with:
          path: versions-dl
          pattern: versions-*
          merge-multiple: false
      - name: Collect versions into one dir
        run: |
          mkdir -p versions
          # each artifact is versions-dl/versions-<name>/<name>.tsv
          find versions-dl -name '*.tsv' -exec cp {} versions/ \;
          ls -1 versions/ || true
      - name: Generate descriptions (with resolved versions)
        # One generator, three outputs from the same data: web-flavored pages at
        # docs/content/{en,zh-cn}/base/*.md (Hugo site) and plain-flavored
        # base/*.md (in-repo readme + Harbor description). See gen_descriptions.py.
        run: |
          python3 docs/gen_data.py
          VERSIONS_DIR="$PWD/versions" python3 docs/gen_descriptions.py

      # Open a PR with the version-enriched descriptions and enable auto-merge.
      # Publication (docs + Harbor) is gated on this PR merging — see
      # base-descriptions-publish.yml. The version diff is the review checkpoint.
      - name: Open descriptions PR (auto-merge)
        run: |
          git config user.name "flagos-ci"
          git config user.email "noreply@flagos.net"
          # All outputs are generated from the same data and must land in one
          # commit so the web pages (en + zh-cn) and the plain base/*.md readmes
          # never drift. base/*.md are English plain-flavor (Harbor is English).
          git add docs/content/en/base/*.md docs/content/zh-cn/base/*.md base/*.md
          if git diff --cached --quiet; then
            echo "no description changes — nothing to PR"; exit 0
          fi
          label="$(git describe --tags --abbrev=0 | sed 's/^v//')"
          branch="auto/base-descriptions-${label}"
          git checkout -b "$branch"
          git commit -m "docs(base): refresh image descriptions for ${label}"
          git push -f origin "$branch"
          if ! gh pr view "$branch" >/dev/null 2>&1; then
            gh pr create --base "${GITHUB_REF_NAME}" --head "$branch" \
              --title "docs(base): refresh image descriptions for ${label}" \
              --body "Automated refresh of per-image descriptions (baked-in system-package versions) for ${label}. On merge, the descriptions publish to the docs site and Harbor."
          fi
          gh pr merge "$branch" --auto --squash || \
            echo "auto-merge queued/unavailable — PR left for review"
