name: Build and Push Base Image

on:
  workflow_call:
    inputs:
      name:
        description: 'Base image name = base/ containerfile (e.g. nvidia-cuda12.8)'
        type: string
        required: true
      push:
        description: 'push image or not'
        type: boolean
        default: false
      runson:
        description: 'runner, JSON-encoded array (e.g. ["ubuntu-latest"])'
        type: string
        default: '["ubuntu-latest"]'

jobs:
  build-image:
    runs-on: ${{ fromJSON(inputs.runson) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # tags needed for version computation (git rev-list)

      - name: Install PyYAML
        # Self-hosted runners (h20) have an externally-managed system Python
        # (PEP 668) that rejects `pip install`. Skip if PyYAML is already
        # importable; otherwise install to the user site with the override.
        run: |
          python3 -c "import yaml" 2>/dev/null \
            || python3 -m pip install --user --break-system-packages pyyaml

      - name: Log in to the Container registry
        if: ${{ inputs.push }}
        env:
          HARBOR_PW: ${{ secrets.HARBOR_AC_FLAGOS_BASE }}
        run: |
          if [ -z "${HARBOR_PW:-}" ]; then
            echo "ERROR: secret HARBOR_AC_FLAGOS_BASE is empty or unset" >&2
            exit 1
          fi
          # registry host = build-config.yml registry.host
          host=$(python3 -c "import yaml;print(yaml.safe_load(open('.github/build-config.yml'))['registry']['host'])")
          echo "Logging in to ${host} as tengqm"
          printf '%s' "${HARBOR_PW}" | docker login "${host}" \
            -u tengqm --password-stdin

      - name: Build base image
        run: |
          python3 scripts/build_base.py "${{ inputs.name }}" ${{ inputs.push && '--push' || '' }}
