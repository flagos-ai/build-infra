name: Build and Push Base Image

on:
  workflow_call:
    inputs:
      name:
        description: 'Base image name = base/ containerfile (e.g. nvidia-cuda12.8)'
        type: string
        required: true
      push:
        description: 'push image or not'
        type: boolean
        default: false
      runson:
        description: 'runner, JSON-encoded array (e.g. ["ubuntu-latest"])'
        type: string
        default: '["ubuntu-latest"]'

jobs:
  build-image:
    runs-on: ${{ fromJSON(inputs.runson) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Log in to the Container registry
        if: ${{ inputs.push }}
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          CONTAINER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
        run: |
          # registry host = build-config.yml registry.host
          host=$(python3 -c "import yaml;print(yaml.safe_load(open('.github/build-config.yml'))['registry']['host'])")
          echo "Logging in to ${host}"
          echo "${CONTAINER_REGISTRY}" | docker login "${host}" \
            -u "${REGISTRY_USERNAME}" --password-stdin

      - name: Build base image
        run: |
          python3 base/build.py "${{ inputs.name }}" ${{ inputs.push && '--push' || '' }}
