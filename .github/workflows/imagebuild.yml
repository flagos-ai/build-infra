name: Build and Push Base Image

on:
  workflow_call:
    inputs:
      name:
        description: 'Base image name = base/ containerfile (e.g. nvidia-cuda12.8)'
        type: string
        required: true
      push:
        description: 'push image or not'
        type: boolean
        default: false
      runson:
        description: 'runner, JSON-encoded array (e.g. ["ubuntu-latest"])'
        type: string
        default: '["ubuntu-latest"]'

jobs:
  build-image:
    runs-on: ${{ fromJSON(inputs.runson) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # tags needed for version computation (git rev-list)

      - name: Install PyYAML
        # Self-hosted runners (h20) have an externally-managed system Python
        # (PEP 668) that rejects `pip install`. Skip if PyYAML is already
        # importable; otherwise install to the user site with the override.
        run: |
          python3 -c "import yaml" 2>/dev/null \
            || python3 -m pip install --user --break-system-packages pyyaml

      - name: Log in to the Container registry
        if: ${{ inputs.push }}
        env:
          HARBOR_PW: ${{ secrets.HARBOR_AC_FLAGOS_BASE }}
          # Harbor is internal — bypass any HTTP_PROXY/HTTPS_PROXY the runner
          # may have set for GitHub access.
          # Only uppercase HTTP_PROXY/HTTPS_PROXY (lowercase clash with runner
          # env vars set by the GitHub Actions runner config).
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          no_proxy: "harbor.baai.ac.cn,.baai.ac.cn"
        run: |
          if [ -z "${HARBOR_PW:-}" ]; then
            echo "ERROR: secret HARBOR_AC_FLAGOS_BASE is empty or unset" >&2
            exit 1
          fi
          # registry host = build-config.yml registry.host
          host=$(python3 -c "import yaml;print(yaml.safe_load(open('.github/build-config.yml'))['registry']['host'])")
          for i in 1 2 3; do
            if printf '%s' "${HARBOR_PW}" | docker login "${host}" -u tengqm --password-stdin; then
              exit 0
            fi
            echo "Harbor login attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "::error::Harbor login failed after 3 attempts"
          exit 1

      - name: Check disk space
        shell: bash
        run: |
          # df -P is POSIX (works everywhere: GNU, busybox, BSD).
          # Check /var/lib/docker first; fall back to . when it's absent.
          FREE_KB=$(df -P /var/lib/docker 2>/dev/null | awk 'NR==2{print $4}')
          if [ -z "$FREE_KB" ] || ! [ "$FREE_KB" -eq "$FREE_KB" ] 2>/dev/null; then
            FREE_KB=$(df -P . | awk 'NR==2{print $4}')
          fi
          if [ -z "$FREE_KB" ] || ! [ "$FREE_KB" -eq "$FREE_KB" ] 2>/dev/null; then
            echo "ERROR: cannot determine free disk space"
            df -h /var/lib/docker . 2>/dev/null || df -h .
            exit 1
          fi
          FREE_GB=$((FREE_KB / 1024 / 1024))
          echo "Free disk space: ${FREE_GB}G"
          if [ "$FREE_GB" -lt 10 ]; then
            echo "ERROR: insufficient disk space (${FREE_GB}G < 10G). Docker needs cleanup."
            df -h /var/lib/docker . 2>/dev/null || df -h .
            exit 1
          fi

      - name: Build base image
        run: |
          python3 scripts/build_base.py "${{ inputs.name }}" ${{ inputs.push && '--push' || '' }}
