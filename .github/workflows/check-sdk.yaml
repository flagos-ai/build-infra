name: SDK dict check

# When a base containerfile changes, verify docs/data/sdk.yaml still covers
# every SDK package it installs (so descriptions don't silently go missing).

on:
  pull_request:
    paths:
      - 'base/**'
      - 'docs/data/sdk.yaml'
      - 'docs/gen_data.py'
      - 'docs/check_sdk.py'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml
      - name: Check SDK dict covers all base-image packages
        run: python3 docs/check_sdk.py
