name: EXPERIMENT - e2e nvidia-cuda13.3 (base -> wheels -> runtime)

# RETRY MODE: the wheels are already built + uploaded to flagos-pypi-daily
# (flag_gems + flag-gems-cpp-cuda @ 5.4.0.dev601+g03122362d, lockstep verified),
# and the runtime image builds fine. The only thing that failed before was the
# ~10 GB runtime PUSH to a flaky Harbor (churned 46 min, hit the job timeout).
#
# So this run SKIPS the wheel stages (re-upload would 409) and pins the known
# version, then focuses on: base (local) -> runtime build -> push to Harbor with
# generous retries (docker push resumes already-uploaded layers). Test on h20 after.

on:
  push:
    branches: [exp/e2e-nvidia]

defaults:
  run:
    shell: bash

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      HARBOR_HOST: harbor.baai.ac.cn
      TEST_PROJECT: harbor.baai.ac.cn/flagos-runtime
      BACKEND: nvidia-cuda13.3
      PYVER: "5.4.0.dev601+g03122362d"    # already on flagos-pypi-daily
      DAILY_INDEX: https://resource.flagos.net/repository/flagos-pypi-daily/simple
      NVIDIA_INDEX: https://resource.flagos.net/repository/flagos-pypi-nvidia/simple
    steps:
      - name: Checkout (full history for git-describe versioning)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Pre-flight - Harbor login (retry; Harbor TLS can be flaky)
        env:
          HARBOR_PW: ${{ secrets.HARBOR_AC_FLAGOS21 }}
        run: |
          [ -n "${HARBOR_PW:-}" ] || { echo "ERROR: HARBOR_AC_FLAGOS21 empty"; exit 1; }
          for i in 1 2 3 4 5 6; do
            if printf '%s' "$HARBOR_PW" | docker login "$HARBOR_HOST" -u flagos21 --password-stdin; then
              echo "login OK (attempt $i)"; exit 0
            fi
            echo "login attempt $i failed; retry in 15s..."; sleep 15
          done
          echo "ERROR: Harbor login failed after retries"; exit 1

      - name: Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h /

      - name: Stage 1 - build base image (local only; serves runtime FROM)
        run: |
          python3 base/build.py "$BACKEND" --registry "$TEST_PROJECT"
          BASE_REF=$(docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep "flagos-runtime/flagos-base-${BACKEND}" | head -1)
          [ -n "$BASE_REF" ] || { echo "ERROR: base image not built/tagged"; exit 1; }
          echo "BASE_REF=$BASE_REF" >> "$GITHUB_ENV"
          echo "base image (local): $BASE_REF"

      - name: Stage 3 - build wheel-based runtime + push to Harbor (generous retries)
        run: |
          cat > /tmp/runtime.Dockerfile <<EOF
          FROM ${BASE_REF}
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update \
              && apt-get install -y --no-install-recommends python3 python3-venv python3-pip \
              && rm -rf /var/lib/apt/lists/*
          RUN python3 -m venv /flagos
          ENV PATH=/flagos/bin:\$PATH
          RUN pip install --upgrade pip \
              && pip install --pre "flag_gems[nvidia-cuda133,cpp-cuda]==${PYVER}" "triton==3.6.0" \
                   --index-url ${DAILY_INDEX} \
                   --extra-index-url ${NVIDIA_INDEX} \
                   --extra-index-url https://pypi.org/simple \
                   --trusted-host resource.flagos.net
          ENV COMPILER=triton USE_C_EXTENSION=1 \
              NVIDIA_VISIBLE_DEVICES=all NVIDIA_DRIVER_CAPABILITIES=compute,utility
          WORKDIR /app
          ENTRYPOINT ["bash"]
          EOF
          RUNTIME_REF="${TEST_PROJECT}/flagos-runtime-${BACKEND}:e2e"
          docker build -f /tmp/runtime.Dockerfile -t "$RUNTIME_REF" /tmp
          echo "runtime built: $RUNTIME_REF ; pushing (docker push resumes layers across retries)"
          pushed=no
          for i in $(seq 1 10); do
            if timeout 1200 docker push "$RUNTIME_REF"; then pushed=yes; echo "runtime push OK (attempt $i)"; break; fi
            echo "runtime push attempt $i failed/timed out; retry in 20s..."; sleep 20
          done
          [ "$pushed" = yes ] || { echo "ERROR: runtime push failed after retries (Harbor still flaky)"; exit 1; }
          echo "RUNTIME_REF=$RUNTIME_REF" >> "$GITHUB_ENV"
          echo "runtime image pushed: $RUNTIME_REF"

      - name: Summary
        if: always()
        run: |
          echo "runtime = ${TEST_PROJECT}/flagos-runtime-${BACKEND}:e2e"
          echo "version = ${PYVER}"

      - name: Logout
        if: always()
        run: docker logout "$HARBOR_HOST" || true
