name: EXPERIMENT - e2e nvidia-cuda13.3 (base -> wheels -> runtime)

# Throwaway depth-first vertical: drive ONE backend through the whole pipeline on
# a GitHub-hosted runner. Self-triggers on push to this branch; never lives on
# main. Pushes to the flagos-runtime/ TEST project + flagos-pypi-daily (maintainer
# deletes after). Production base/, runtime/, configs.yaml are NOT touched — the
# C++ build and runtime build use inline scripts/Dockerfiles here.
#
# Stages: (0) pre-flight  (1) base -> Harbor  (2) both wheels -> flagos-pypi-daily
#         (3) wheel-based runtime -> Harbor. GPU test happens later, manually, on h20.

on:
  push:
    branches: [exp/e2e-nvidia]

defaults:
  run:
    shell: bash

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      HARBOR_HOST: harbor.baai.ac.cn
      TEST_PROJECT: harbor.baai.ac.cn/flagos-runtime
      BACKEND: nvidia-cuda13.3
      FLAGGEMS_REF: wheel-packaging-split
      CUDA_DEVEL: nvcr.io/nvidia/cuda:13.3.0-devel-ubuntu24.04
      DAILY_INDEX: https://resource.flagos.net/repository/flagos-pypi-daily/simple
      NVIDIA_INDEX: https://resource.flagos.net/repository/flagos-pypi-nvidia/simple
      DAILY_UPLOAD: https://resource.flagos.net/repository/flagos-pypi-daily/
    steps:
      - name: Checkout (full history for git-describe versioning)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---- Stage 0: pre-flight (fail fast) --------------------------------
      - name: Pre-flight - secrets present
        env:
          NEXUS_TOKEN: ${{ secrets.NEXUS_TOKEN }}
          HARBOR_PW: ${{ secrets.HARBOR_AC_FLAGOS21 }}
        run: |
          [ -n "${NEXUS_TOKEN:-}" ] || { echo "ERROR: NEXUS_TOKEN secret is empty/unset"; exit 1; }
          [ -n "${HARBOR_PW:-}" ]   || { echo "ERROR: HARBOR_AC_FLAGOS21 secret is empty/unset"; exit 1; }
          echo "both secrets present"

      - name: Pre-flight - Harbor login (retry; Harbor TLS can be flaky)
        env:
          HARBOR_PW: ${{ secrets.HARBOR_AC_FLAGOS21 }}
        run: |
          for i in 1 2 3 4 5 6; do
            if printf '%s' "$HARBOR_PW" | docker login "$HARBOR_HOST" -u flagos21 --password-stdin; then
              echo "login OK (attempt $i)"; exit 0
            fi
            echo "login attempt $i failed (transient TLS?); retrying in 15s..."; sleep 15
          done
          echo "ERROR: Harbor login failed after retries"; exit 1

      - name: Pre-flight - torch/triton resolvable from FlagOS index (the cuda13.3 risk)
        run: |
          set -x
          python3 -m pip install --dry-run --no-deps --quiet \
            "torch==2.11.0+cu130" \
            --index-url "$NVIDIA_INDEX" --extra-index-url https://pypi.org/simple \
            --trusted-host resource.flagos.net \
            || { echo "PRE-FLIGHT FAIL: torch==2.11.0+cu130 not resolvable"; exit 1; }
          python3 -m pip install --dry-run --no-deps --quiet \
            "triton==3.6.0" \
            --index-url "$NVIDIA_INDEX" --extra-index-url https://pypi.org/simple \
            --trusted-host resource.flagos.net \
            || { echo "PRE-FLIGHT FAIL: triton==3.6.0 not resolvable"; exit 1; }
          echo "torch + triton resolvable"

      - name: Pre-flight - free disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h /

      # ---- Stage 1: base image -> Harbor (test project) -------------------
      - name: Stage 1 - build base (local) + best-effort push to Harbor
        run: |
          # Build + tag locally (NO --push): the base only needs to be in the local
          # docker cache to serve the runtime FROM on this same runner.
          python3 base/build.py "$BACKEND" --registry "$TEST_PROJECT"
          BASE_REF=$(docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep "flagos-runtime/flagos-base-${BACKEND}" | head -1)
          [ -n "$BASE_REF" ] || { echo "ERROR: base image not built/tagged"; exit 1; }
          echo "BASE_REF=$BASE_REF" >> "$GITHUB_ENV"
          echo "base image (local): $BASE_REF"
          # Push to Harbor is best-effort re-validation (already proven separately).
          # `timeout` guards against Harbor TLS stalls (a hung push doesn't error).
          # Non-fatal: don't block the novel wheels/runtime stages on a flaky Harbor.
          pushed=no
          for i in 1 2 3; do
            if timeout 420 docker push "$BASE_REF"; then pushed=yes; echo "base push OK (attempt $i)"; break; fi
            echo "base push attempt $i failed/timed out; retry in 20s..."; sleep 20
          done
          [ "$pushed" = yes ] || echo "WARNING: base push did not complete (Harbor flaky) — continuing; base is local for runtime FROM"

      # ---- Stage 2: build both wheels, upload to flagos-pypi-daily --------
      - name: Stage 2a - pure-Python flag_gems wheel
        run: |
          OUTDIR="$PWD/wheels" bash flaggems-builder/build.sh
          whl=$(ls "$PWD"/wheels/flag_gems-*-py3-none-any.whl | head -1)
          [ -n "$whl" ] || { echo "ERROR: pure-Python wheel not built"; exit 1; }
          PYVER=$(basename "$whl" | sed -E 's/^flag_gems-(.+)-py3-none-any\.whl$/\1/')
          echo "PYVER=$PYVER" >> "$GITHUB_ENV"
          echo "pure-Python wheel: $(basename "$whl")  (version $PYVER)"

      - name: Stage 2b - C++ operators wheel (flag-gems-cpp-cuda) in CUDA devel image
        run: |
          cat > /tmp/cppbuild.sh <<'SCRIPT'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends python3 python3-venv python3-pip git ca-certificates curl
          python3 -m venv /venv
          . /venv/bin/activate
          pip install --upgrade pip
          pip install "torch==2.11.0+cu130" "triton==3.6.0" \
            scikit-build-core==0.12.2 pybind11==3.0.3 "cmake>=3.20,<4" ninja==1.13.0 "setuptools-scm>=8" PyYAML \
            --index-url "$NVIDIA_INDEX" --extra-index-url https://pypi.org/simple --trusted-host resource.flagos.net
          git clone --quiet https://github.com/flagos-ai/FlagGems.git /src
          git -C /src fetch --quiet --tags --force origin || true
          git -C /src checkout --quiet "$FLAGGEMS_REF"
          bash /src/tools/set_cpp_vendor.sh cuda
          cd /src
          SETUPTOOLS_SCM_PRETEND_VERSION="$PYVER" \
            CMAKE_ARGS="-DFLAGGEMS_BUILD_C_EXTENSIONS=ON -DFLAGGEMS_BACKEND=CUDA -DCMAKE_BUILD_TYPE=Release" \
            pip wheel ./cpp --no-build-isolation -w /out
          chmod -R a+rw /out
          ls -l /out
          SCRIPT
          docker run --rm \
            -v "$PWD/wheels:/out" \
            -v /tmp/cppbuild.sh:/cppbuild.sh:ro \
            -e PYVER="$PYVER" -e NVIDIA_INDEX="$NVIDIA_INDEX" -e FLAGGEMS_REF="$FLAGGEMS_REF" \
            "$CUDA_DEVEL" bash /cppbuild.sh
          cppwhl=$(ls "$PWD"/wheels/flag_gems_cpp_cuda-*.whl | head -1)
          [ -n "$cppwhl" ] || { echo "ERROR: C++ wheel not built"; exit 1; }
          echo "C++ wheel: $(basename "$cppwhl")"

      - name: Stage 2c - upload both wheels to flagos-pypi-daily
        env:
          NEXUS_TOKEN: ${{ secrets.NEXUS_TOKEN }}
        run: |
          python3 -m pip install --quiet twine
          echo "uploading:"; ls -1 "$PWD"/wheels/*.whl
          python3 -m twine upload \
            --repository-url "$DAILY_UPLOAD" \
            -u "${NEXUS_TOKEN%%:*}" -p "${NEXUS_TOKEN#*:}" \
            --non-interactive --disable-progress-bar \
            "$PWD"/wheels/*.whl

      # ---- Stage 3: wheel-based runtime image -> Harbor -------------------
      - name: Stage 3 - build + push wheel-based runtime image
        run: |
          cat > /tmp/runtime.Dockerfile <<EOF
          FROM ${BASE_REF}
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update \
              && apt-get install -y --no-install-recommends python3 python3-venv python3-pip \
              && rm -rf /var/lib/apt/lists/*
          RUN python3 -m venv /flagos
          ENV PATH=/flagos/bin:\$PATH
          RUN pip install --upgrade pip \
              && pip install --pre "flag_gems[nvidia-cuda133,cpp-cuda]==${PYVER}" "triton==3.6.0" \
                   --index-url ${DAILY_INDEX} \
                   --extra-index-url ${NVIDIA_INDEX} \
                   --extra-index-url https://pypi.org/simple \
                   --trusted-host resource.flagos.net
          ENV COMPILER=triton USE_C_EXTENSION=1 \
              NVIDIA_VISIBLE_DEVICES=all NVIDIA_DRIVER_CAPABILITIES=compute,utility
          WORKDIR /app
          ENTRYPOINT ["bash"]
          EOF
          RUNTIME_REF="${TEST_PROJECT}/flagos-runtime-${BACKEND}:e2e"
          docker build -f /tmp/runtime.Dockerfile -t "$RUNTIME_REF" /tmp
          pushed=no
          for i in 1 2 3 4 5; do
            if timeout 600 docker push "$RUNTIME_REF"; then pushed=yes; echo "runtime push OK (attempt $i)"; break; fi
            echo "runtime push attempt $i failed/timed out; retry in 20s..."; sleep 20
          done
          [ "$pushed" = yes ] || { echo "ERROR: runtime push failed after retries (Harbor)"; exit 1; }
          echo "runtime image: $RUNTIME_REF"

      - name: Summary
        if: always()
        run: |
          echo "BASE_REF=${BASE_REF:-?}"
          echo "PYVER=${PYVER:-?}"
          echo "runtime=${TEST_PROJECT}/flagos-runtime-${BACKEND}:e2e"

      - name: Logout
        if: always()
        run: docker logout "$HARBOR_HOST" || true
