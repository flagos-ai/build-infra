name: EXPERIMENT - e2e nvidia-cuda13.3 on h20 (self-hosted)

# Runs on the h20 self-hosted runner: LAN-fast Harbor push + real GPUs.
# Sequence: build base (local) -> build wheel-based runtime -> push to Harbor ->
# evict local -> cold-pull from Harbor (probe pull path) -> GPU verify.
# The wheels are already on flagos-pypi-daily @ 5.4.0.dev601+g03122362d.
# Self-triggers on push to this branch.

on:
  push:
    branches: [exp/e2e-nvidia]

defaults:
  run:
    shell: bash

jobs:
  e2e-h20:
    runs-on: [self-hosted, h20]
    timeout-minutes: 60
    env:
      HARBOR_HOST: harbor.baai.ac.cn
      RUNTIME_REF: harbor.baai.ac.cn/flagos-runtime/flagos-runtime-nvidia-cuda13.3:e2e
      BASE_TAG: flagos-base-nvidia-cuda13.3:e2e-local
      PYVER: "5.4.0.dev601+g03122362d"
      DAILY: https://resource.flagos.net/repository/flagos-pypi-daily/simple
      NVIDIA: https://resource.flagos.net/repository/flagos-pypi-nvidia/simple
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Harbor login (flagos21)
        env:
          HARBOR_PW: ${{ secrets.HARBOR_AC_FLAGOS21 }}
        run: |
          [ -n "${HARBOR_PW:-}" ] || { echo "ERROR: HARBOR_AC_FLAGOS21 empty"; exit 1; }
          printf '%s' "$HARBOR_PW" | docker login "$HARBOR_HOST" -u flagos21 --password-stdin

      - name: Build base image (local, for runtime FROM)
        run: docker build -f base/nvidia-cuda13.3 -t "$BASE_TAG" base/

      - name: Build wheel-based runtime image
        run: |
          cat > /tmp/runtime.Dockerfile <<EOF
          FROM $BASE_TAG
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y --no-install-recommends python3 python3-venv python3-pip && rm -rf /var/lib/apt/lists/*
          RUN python3 -m venv /flagos
          ENV PATH=/flagos/bin:\$PATH
          RUN pip install --upgrade pip && pip install --pre "flag_gems[nvidia-cuda133,cpp-cuda]==$PYVER" "triton==3.6.0" --index-url $NVIDIA --extra-index-url $DAILY --trusted-host resource.flagos.net
          ENV COMPILER=triton USE_C_EXTENSION=1 NVIDIA_VISIBLE_DEVICES=all NVIDIA_DRIVER_CAPABILITIES=compute,utility
          WORKDIR /app
          ENTRYPOINT ["bash"]
          EOF
          docker build -f /tmp/runtime.Dockerfile -t "$RUNTIME_REF" /tmp

      - name: Push runtime to Harbor (LAN — measure bandwidth)
        run: |
          t0=$(date +%s)
          docker push "$RUNTIME_REF"
          t1=$(date +%s)
          echo "PUSH_SECONDS=$((t1 - t0))"

      - name: Evict local images (so verify pulls fresh from Harbor)
        run: |
          docker image rm "$RUNTIME_REF" "$BASE_TAG" >/dev/null 2>&1 || true
          docker image prune -f >/dev/null 2>&1 || true
          echo "local runtime images remaining: $(docker images -q "$RUNTIME_REF" | wc -l | tr -d ' ')"

      - name: Cold-pull runtime from Harbor (probe pull path)
        run: |
          t0=$(date +%s)
          docker pull "$RUNTIME_REF"
          t1=$(date +%s)
          echo "PULL_SECONDS=$((t1 - t0))"

      - name: GPU verification (import + version + cpp .so + op on H20)
        run: |
          cat > /tmp/verify.py <<'PY'
          import torch, flag_gems, os, glob
          print("flag_gems", getattr(flag_gems, "__version__", "?"))
          print("torch", torch.__version__, "| cuda", torch.cuda.is_available(), "| ndev", torch.cuda.device_count())
          d = os.path.dirname(flag_gems.__file__)
          sos = glob.glob(os.path.join(d, "**", "*.so"), recursive=True)
          print("cpp .so present:", len(sos) > 0, [os.path.basename(x) for x in sos[:4]])
          try:
              a = torch.randn(256, 256, device="cuda", dtype=torch.float16)
              b = torch.randn(256, 256, device="cuda", dtype=torch.float16)
              ref = a @ b
              with flag_gems.use_gems():
                  c = a @ b
              print("GPU op via flag_gems OK:", bool(torch.allclose(c, ref, atol=1e-2, rtol=1e-2)))
          except Exception as e:
              print("op test note:", repr(e))
          PY
          docker run --rm --gpus all -v /tmp/verify.py:/verify.py:ro "$RUNTIME_REF" python /verify.py

      - name: Logout
        if: always()
        run: docker logout "$HARBOR_HOST" || true
