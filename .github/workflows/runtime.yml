name: Runtime Image Build (manual)

# Runtime images are built on demand, not on every push/PR. They layer
# FlagGems (pure Python + optional C++ extension) on top of a base image
# via wheel install. Trigger this manually to build a backend (or all).

on:
  workflow_dispatch:
    inputs:
      backend:
        description: 'Backend to build (e.g. nvidia-cuda12.8), or "all"'
        type: string
        default: all
      push:
        description: 'push image(s) to the registry'
        type: boolean
        default: false
      flaggems:
        description: 'FlagGems wheel version to install (e.g. 5.4.0.dev601+g03122362d)'
        type: string
        default: ''
      no_flaggems:
        description: 'skip flag_gems install — produce build-platform image (step 4)'
        type: boolean
        default: false

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - id: set-matrix
        shell: bash
        run: |
          if [[ "${{ inputs.backend }}" == "all" ]]; then
            python3 scripts/generate_matrix.py > matrix.json
          else
            python3 scripts/generate_matrix.py ${{ inputs.backend }} > matrix.json
          fi
          cat matrix.json
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build-matrix:
    needs: set-matrix
    if: ${{ fromJSON(needs.set-matrix.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    name: runtime-${{ matrix.name }}
    runs-on: ${{ fromJSON(matrix.runson) }}
    steps:
      - name: Checkout build-infra
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python (isolated venv)
        run: |
          python3 -m venv /tmp/ci-venv
          /tmp/ci-venv/bin/pip install --quiet pyyaml twine

      - name: Harbor login (pull base image + push runtime)
        if: ${{ inputs.push }}
        env:
          HARBOR_PW: ${{ secrets.HARBOR_AC_FLAGOS_BASE }}
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          no_proxy: "harbor.baai.ac.cn,.baai.ac.cn"
        run: |
          host=$(/tmp/ci-venv/bin/python -c "import yaml;print(yaml.safe_load(open('.github/build-config.yml'))['registry']['host'])")
          for i in 1 2 3; do
            if printf '%s' "$HARBOR_PW" | docker login "$host" -u tengqm --password-stdin; then
              exit 0
            fi
            echo "Harbor login attempt $i failed, retrying..."
            sleep 30
          done
          echo "::error::Harbor login failed after 3 attempts"
          exit 1

      - name: Build runtime image
        env:
          NEXUS_TOKEN: ${{ secrets.NEXUS_TOKEN }}
        run: |
          push_flag=""
          if [[ "${{ inputs.push }}" == "true" ]]; then
            push_flag="--push"
          fi
          no_flag=""
          if [[ "${{ inputs.no_flaggems }}" == "true" ]]; then
            no_flag="--no-flaggems"
          fi
          /tmp/ci-venv/bin/python scripts/build_runtime.py "${{ matrix.name }}" \
            --flaggems "${{ inputs.flaggems }}" \
            ${push_flag} ${no_flag}
