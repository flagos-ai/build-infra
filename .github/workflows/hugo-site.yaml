name: Docs site

# Build the Hugo docs site and publish it to the flagos-ai/release-info repo,
# which serves it at https://flagos-ai.github.io/release-info/ (release-info's
# Pages is set to "Deploy from a branch" -> gh-pages). The catalog / per-image
# tables are generated from configs.yaml + base/ by docs/gen_data.py before build,
# so the published docs always match the source.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'configs.yaml'
      - 'base/**'
      - '.github/build-config.yml'
      - '.github/workflows/hugo-site.yaml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Theme + Bootstrap come from Hugo Modules (see docs/go.mod), not a
          # submodule, so submodule checkout is no longer required.
          fetch-depth: 0

      - name: Install Go
        # Hugo Modules are Go modules under the hood; Hugo shells out to `go`
        # to download the theme and Bootstrap SCSS during the build.
        uses: actions/setup-go@v7
        with:
          go-version: 'stable'

      - name: Install Hugo (extended)
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Generate docs data
        run: python3 docs/gen_data.py

      - name: Build the site
        run: |
          cd docs
          hugo build --gc --minify

      - name: Deploy to flagos-ai/release-info
        uses: peaceiris/actions-gh-pages@v4
        with:
          # FLAGOS_RELEASE_INFO is an SSH deploy key for flagos-ai/release-info.
          # If it is a PAT instead, replace `deploy_key` with `personal_token`.
          deploy_key: ${{ secrets.FLAGOS_RELEASE_INFO }}
          external_repository: flagos-ai/release-info
          publish_branch: gh-pages
          publish_dir: ./docs/public
