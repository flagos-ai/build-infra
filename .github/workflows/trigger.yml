name: Base Image Build (manual)

# Base images are built on demand, not on every push/PR. Vendor SDKs change
# rarely, so with 10+ backends auto-building on each change is more noise than
# value at the current maturity. Trigger this manually to build a backend (or
# all). A future job may detect configs.yaml drift and remind maintainers.

on:
  workflow_dispatch:
    inputs:
      backend:
        description: 'Backend to build = base/<name> (e.g. nvidia-cuda12.8), or "all"'
        type: string
        default: all
      push:
        description: 'push image(s) to the registry'
        type: boolean
        default: false

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - id: set-matrix
        shell: bash
        run: |
          if [[ "${{ inputs.backend }}" == "all" ]]; then
            python3 scripts/generate_matrix.py > matrix.json
          else
            python3 scripts/generate_matrix.py ${{ inputs.backend }} > matrix.json
          fi
          cat matrix.json
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build-matrix:
    needs: set-matrix
    if: ${{ fromJSON(needs.set-matrix.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    name: build-${{ matrix.name }}
    uses: ./.github/workflows/imagebuild.yml
    with:
      name: ${{ matrix.name }}
      runson: ${{ matrix.runson }}
      push: ${{ inputs.push }}
    secrets: inherit
