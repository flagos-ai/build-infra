  hygon:      { en: Hygon,           zh: 海光 }
  iluvatar:   { en: Iluvatar,        zh: 天数智芯 }
  kunlunxin:  { en: Kunlunxin,       zh: 昆仑芯 }
  metax:      { en: MetaX,           zh: 沐曦 }
  mthreads:   { en: Moore Threads,   zh: 摩尔线程 }
  spacemit:   { en: SpacemiT,        zh: 进迭时空 }
  sunrise:    { en: Sunrise,         zh: 曦望 }
