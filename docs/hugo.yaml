baseURL: https://flagos-ai.github.io/release-info/
title: Release Info
languageCode: en-us
theme:
  - hugo-book

contentDir: content/en
defaultContentLanguage: en
defaultContentLanguageInSubdir: false
timeZone: UTC
enableGitInfo: true

markup:
  goldmark:
    extensions:
      definitionList: true
      table: true
    parser:
      autoHeadingID: true
    renderer:
      unsafe: true
  highlight:
    noClasses: true
    style: github-dark
    tabWidth: 4
  tableOfContents:
    startLevel: 1
    endLevel: 3
    ordered: false

menus:
  after:
    - name: GitHub
      url: https://github.com/flagos-ai/build-infra
      weight: 10
    - name: FlagOS
      url: https://flagos.io/
      weight: 20

# English is the only translated language for now; zh-cn is reserved so adding
# Chinese later is purely additive (translate content/zh-cn + i18n/zh-cn.toml).
languages:
  en:
    title: Release Info
    languageName: English
    contentDir: content/en
    weight: 1
    languagedirection: ltr
  zh-cn:
    title: 发布信息
    languageName: 简体中文
    contentDir: content/zh-cn
    weight: 2
    languagedirection: ltr

params:
  BookSection: '*'
  BookTheme: auto
  BookToC: true
  BookLastChangeLink: 'https://github.com/flagos-ai/build-infra/commit/{{ .GitInfo.Hash }}'
