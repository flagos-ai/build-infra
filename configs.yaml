# FlagOS build configuration.
#
# Defines the supported vendors and their SDK variants.
# Used by both base/build.py and runtime/build.py.
#
# Base image naming convention:
#   {base_image_prefix}-{vendor}-{variant}:{version}-{revision}
#   e.g. flagos-base-nvidia-cuda12.8:2.1.0-0
#   Version and revision are read from OCI LABELs in base/{vendor}-{variant}.
#
# Runtime image naming convention:
#   flagos-runtime-{vendor}-{variant}:latest
#   e.g. flagos-runtime-nvidia-cuda12.8:latest
#
# The "backends" section maps vendor → list of SDK variants.
# For multi-variant vendors (nvidia, ascend), the FlagGems
# backend key is "{vendor}-{variant_no_dots}"
# (e.g. "nvidia-cuda128"). For single-variant vendors, the
# backend key is just the vendor name (e.g. "cambricon").
#
# "runtime_env" defines environment variables to set in runtime
# containers. These are container-specific and not used for
# bare-metal/VM installations (see FlagGems tools/env.sh for that).

base_image_prefix: "flagos-base"

backends:
  nvidia:
    - cuda12.8
    - cuda13.3
  ascend:
    - cann8.5.0
    - cann9.0.0
  cambricon:
    - neuware4.4.3
  enflame:
    - tops1.9.10
  hygon:
    - dtk26.04
  iluvatar:
    - corex4.4.0
  kunlunxin:
    - xre5.29.0
  metax:
    - maca3.7.2.1
  mthreads:
    - musa4.3.6
  sunrise:
    - tangrt1.2.0
  thead:
    - ppu2.0.0
  tsingmicro:
    - tsm260604

runtime_env:
  nvidia-cuda12.8:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
  nvidia-cuda13.3:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
  mthreads:
    MTHREADS_VISIBLE_DEVICES: "all"
    LD_LIBRARY_PATH: "${VIRTUAL_ENV}/lib:${LD_LIBRARY_PATH}"
  tsingmicro:
    USE_TORCH_XLA: "0"
    TORCH_COMPILE_DISABLE: "1"
