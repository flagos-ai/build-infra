        - benchflow==1.0.0
        - colorama==0.4.6
        - flash_attn==2.4.2+7e2dd4d
        - hydrax==0.1.0
        - hyperparameter==0.5.6
        - psutil==6.1.0
        - regex==2026.4.4
        - torch==2.9.0+cu129
        - torchaudio==2.9.0+cu129
        - torchvision==0.24.0+cu129
        - torch_plugin==0.1.0
        - torch_xray==2.0.4
        - xformers==0.0.29+1e7a8ec.d20260114
        - xmlir==1.0.0.1

  metax:
    maca3.7.2.1:
      extras: metax
      python: "3.12"
      triton: triton==3.0.0+metax3.7.2.0
      flagtree: flagtree==3.1.0+metax3.7.2.0
      env:
        base:
          PATH: /opt/maca/mxgpu_llvm/bin:/opt/maca/bin:${PATH}
          MACA_PATH: /opt/maca
          LD_LIBRARY_PATH: /opt/maca/lib:/opt/maca/mxgpu_llvm/lib
      deps:
        - torch==2.8.0+metax3.7.2.0
        - torchaudio==2.4.1+metax3.7.2.0
        - torchvision==0.15.1+metax3.7.2.0
