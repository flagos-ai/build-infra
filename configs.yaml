          PATH: /usr/local/musa/bin:${PATH}
          LD_LIBRARY_PATH: /usr/local/musa/lib
        runtime:
          MTHREADS_VISIBLE_DEVICES: "all"
          LD_LIBRARY_PATH: "${VIRTUAL_ENV}/lib:${LD_LIBRARY_PATH}"
      deps:
        - torch==2.9.0+musa5.2.0
        - torch_musa==2.9.1
        - mkl==2024.0.0

  # No base image yet — dependency spec kept as source of truth.
  spacemit:
    spacemit:
      extras: spacemit
      python: "3.12"
      triton: triton==3.6.0+spacemit.a5
      deps:
        - torch==2.8.0+spacemit.0

  sunrise:
    tangrt1.2.0:
      extras: sunrise
      python: "3.10"
      triton: triton==3.4.0.6+gite4f6d6e4
      # flagtree==0.4.0+sunrise3.4 — requires GLIBC_2.39, unavailable on current system
      env:
        base:
          TANGRT_ROOT: /usr/local/tangrt
          LIBRARY_PATH: /usr/local/tangrt/targets/linux-x86_64/lib:/usr/local/tangrt/lib/linux-x86_64
