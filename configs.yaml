      env:
        # TODO: expand set_env.sh into the base image as ENV (avoid sourcing).
        base_source:
          - /usr/local/Ascend/cann/set_env.sh
      deps:
        - torch==2.10.0+cpu
        - torch-npu==2.10.0

  cambricon:
